const SCHED_KEY   = 'summer26_sched_v1';
const GYM_KEY     = 'summer26_gym_v1';
let scheduleState;
let gymState = {};
let dragSrc = null;

function loadScheduleState() {
  try {
    const saved = localStorage.getItem(SCHED_KEY);
    scheduleState = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(schedule));
  } catch(e) {
    scheduleState = JSON.parse(JSON.stringify(schedule));
  }
}

function saveScheduleState() {
  try { localStorage.setItem(SCHED_KEY, JSON.stringify(scheduleState)); } catch(e) {}
}

function loadGymState() {
  try {
    const saved = localStorage.getItem(GYM_KEY);
    gymState = saved ? JSON.parse(saved) : {};
  } catch(e) { gymState = {}; }
  // ensure each week has an array sized to its day count
  Object.keys(schedule).forEach(wk => {
    if (!Array.isArray(gymState[wk]) || gymState[wk].length !== schedule[wk].days.length) {
      gymState[wk] = schedule[wk].days.map(() => false);
    }
  });
}

function saveGymState() {
  try { localStorage.setItem(GYM_KEY, JSON.stringify(gymState)); } catch(e) {}
}

function toggleGym(wk, dayIdx) {
  if (!Array.isArray(gymState[wk])) gymState[wk] = [];
  gymState[wk][dayIdx] = !gymState[wk][dayIdx];
  saveGymState();
  render();
}

function dragStart(e, wk, dayIdx, itemIdx) {
  dragSrc = { wk, dayIdx, itemIdx };
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e, el) {
  e.preventDefault();
  el.classList.add('drag-over');
}

function dragLeave(el) {
  el.classList.remove('drag-over');
}

function dropOn(e, wk, dayIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragSrc) return;
  const srcItems = scheduleState[dragSrc.wk].days[dragSrc.dayIdx].items;
  const [item] = srcItems.splice(dragSrc.itemIdx, 1);
  scheduleState[wk].days[dayIdx].items.push(item);
  dragSrc = null;
  saveScheduleState();
  render();
}

  loadGymState();
  // auto-jump to current week
  const today = new Date();
  const ranges = [
    { key:'w1', start:[2026,4,13], end:[2026,4,20] },
    { key:'w2', start:[2026,4,20], end:[2026,4,27] },
    { key:'w3', start:[2026,4,27], end:[2026,5,3]  },
    { key:'w4', start:[2026,5,3],  end:[2026,5,14] },
    { key:'w5', start:[2026,5,14], end:[2026,5,22] },
    { key:'w6', start:[2026,5,22], end:[2026,6,6]  },
    { key:'w7', start:[2026,6,6],  end:[2026,6,13] },
    { key:'w8', start:[2026,6,13], end:[2026,6,20] },
    { key:'w9', start:[2026,6,20], end:[2026,6,28] },
  ];
  for (const r of ranges) {
    const s = new Date(r.start[0], r.start[1], r.start[2]);
    const e = new Date(r.end[0],   r.end[1],   r.end[2]+1);
    if (today >= s && today < e) { currentWeek = r.key; break; }
  }
  render();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch(e) {}
}

function toggleTask(id) { checked[id] = !checked[id]; saveState(); render(); }
function setView(v)    { viewMode = v; render(); }
function setWeek(k)    { currentWeek = k; render(); }

function getWeekProgress(wk) {
  const w = weeks[wk]; let total=0,done=0;
  w.categories.forEach(c => c.tasks.forEach(t => { total++; if(checked[t.id]) done++; }));
  return {total,done};
}

function isToday(m, d) {
  const t = new Date(); return t.getMonth()===m && t.getDate()===d;
}

// ─────────────────────────────────────────────
// RENDER: shared nav
// ─────────────────────────────────────────────
function renderNav() {
  const weekBtns = Object.entries(weeks).map(([k,w]) => {
    const {done,total} = getWeekProgress(k);
    return `<button class="week-btn${k===currentWeek?' active':''}" onclick="setWeek('${k}')">${w.label} <span class="wdates">${w.dates}</span></button>`;
  }).join('');

  return `
    <div class="view-nav">
      <button class="view-btn${viewMode==='tasks'?' active':''}"    onclick="setView('tasks')">📋 Tasks</button>
      <button class="view-btn${viewMode==='schedule'?' active':''}" onclick="setView('schedule')">📅 Schedule</button>
      <button class="view-btn reading-btn${viewMode==='reading'?' active':''}" onclick="setView('reading')">📚 Reading List</button>
    </div>
    ${viewMode!=='reading' ? `<div class="week-nav">${weekBtns}</div>` : ''}
  `;
}

// ─────────────────────────────────────────────
// RENDER: Tasks view
// ─────────────────────────────────────────────
function renderTasks() {
  const week = weeks[currentWeek];
  const {total,done} = getWeekProgress(currentWeek);
  const pct = total ? Math.round(done/total*100) : 0;
  const badge = week.badge;

  let html = `
    <div class="week-badge ${badge.type}">${badge.icon} ${badge.text}</div>
    <div class="status-bar"><strong>${done}/${total}</strong> tasks done · <strong>${pct}%</strong> complete</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>Critical</div>
      <div class="leg"><div class="leg-dot" style="background:#BA7517"></div>High</div>
      <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>Medium</div>
      <div class="leg"><div class="leg-dot" style="background:#639922"></div>Low</div>
    </div>
    <div class="grid">`;

  week.categories.forEach(cat => {
    const catDone = cat.tasks.filter(t => checked[t.id]).length;
    const catPct  = cat.tasks.length ? (catDone/cat.tasks.length)*100 : 0;
    html += `
      <div class="card">
        <div class="card-header">
          <span class="card-icon">${cat.icon}</span>
          <span class="card-title">${cat.title}</span>
          <span class="card-count">${catDone}/${cat.tasks.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${catPct}%"></div></div>
        <div class="task-list">`;
    cat.tasks.forEach(t => {
      html += `
          <div class="task-item${checked[t.id]?' done':''}" onclick="toggleTask('${t.id}')">
            <div class="checkbox">
              <svg class="checkmark" width="9" height="9" viewBox="0 0 9 9" fill="none">
                <path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="dot dot-${t.priority}"></div>
            <div class="task-content">
              <div class="task-text">${t.text}</div>
              ${t.sub?`<div class="task-sub">${t.sub}</div>`:''}
            </div>
          </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

// ─────────────────────────────────────────────
// RENDER: Schedule view
// ─────────────────────────────────────────────
function renderSchedule() {
  const week = weeks[currentWeek];
  const sched = scheduleState[currentWeek];
  const badge = week.badge;

  function monthLabel(m) {
    if (m===4) return 'May';
    if (m===5) return 'Jun';
    if (m===6) return 'Jul';
    return '';
  }

  let html = `
    <div class="week-badge ${badge.type}">${badge.icon} ${badge.text}</div>
    <div class="schedule-grid">`;

  for (let dayIdx = 0; dayIdx < sched.days.length; dayIdx++) {
    const day = sched.days[dayIdx];
    const today = isToday(day.m, day.d);
    const accentClass = day.accent ? ` ${day.accent}` : '';
    const todayClass  = today ? ' is-today' : '';
    html += `<div class="day-col${accentClass}${todayClass}" ondragover="dragOver(event,this)" ondragleave="dragLeave(this)" ondrop="dropOn(event,'${currentWeek}',${dayIdx})">
      <div class="day-header">
        <div class="day-name">${day.day}</div>
        <div class="day-date">${monthLabel(day.m)} ${day.d}</div>
        <div class="today-pip">Today</div>
      </div>
      <div class="day-items">`;

    for (let itemIdx = 0; itemIdx < day.items.length; itemIdx++) {
      const item = day.items[itemIdx];
      const isLinked = !!item.taskId;
      const isDone   = isLinked && !!checked[item.taskId];
      const dragAttrs = `draggable="true" ondragstart="dragStart(event,'${currentWeek}',${dayIdx},${itemIdx})"`;

      if (['sched-event','sched-travel','sched-milestone','sched-rest'].includes(item.type)) {
        if (isLinked) {
          html += `<div class="day-item ${item.type}${isDone?' sched-done':''}" ${dragAttrs} onclick="toggleTask('${item.taskId}')" style="cursor:grab;display:flex;align-items:flex-start;gap:6px;">
            <div class="sched-cb${isDone?' sched-cb-done':''}">
              ${isDone?`<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 4L3 6L7 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
            </div>
            <span class="sched-item-text"${isDone?' style="text-decoration:line-through;opacity:0.5"':''}>${item.text}</span>
          </div>`;
        } else {
          html += `<div class="day-item ${item.type}" ${dragAttrs}><span class="sched-item-text">${item.text}</span></div>`;
        }
      } else {
        if (isLinked) {
          html += `<div class="day-item sched-task${isDone?' sched-done':''}" ${dragAttrs} onclick="toggleTask('${item.taskId}')" style="cursor:grab;">
            <div class="sched-cb${isDone?' sched-cb-done':''}">
              ${isDone?`<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 4L3 6L7 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
            </div>
            <span class="sched-item-text"${isDone?' style="text-decoration:line-through;opacity:0.5"':''}>${item.text}</span>
          </div>`;
        } else {
          html += `<div class="day-item sched-task" ${dragAttrs}><span class="sched-dot ${item.type}"></span><span class="sched-item-text">${item.text}</span></div>`;
        }
      }
    }

    // gym row
    const gymDone = gymState[currentWeek] && gymState[currentWeek][dayIdx];
    html += `<div class="gym-row" draggable="false" onclick="event.stopPropagation();toggleGym('${currentWeek}',${dayIdx})">
      <div class="gym-cb${gymDone?' gym-cb-done':''}">
        ${gymDone?`<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 4L3 6L7 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <span>🏋️ Gym</span>
    </div>`;

    html += `</div></div>`;
  }

  html += `</div>`;

  // gym strip for non-Europe weeks
  if (weeks[currentWeek].badge.type !== 'travel') {
    const gymCount = Math.min((gymState[currentWeek] || []).filter(Boolean).length, 5);
    const bars = [1,2,3,4,5].map(i =>
      `<div class="gym-bar-block${i <= gymCount ? ' filled' : ''}"></div>`
    ).join('');
    html += `<div class="gym-strip">
      <span class="gym-strip-label">💪 Gym this week</span>
      <div class="gym-bars">${bars}</div>
      <span class="gym-strip-count">${gymCount}/5</span>
    </div>`;
  }

  return html;
}

// ─────────────────────────────────────────────
// RENDER: Reading List view
// ─────────────────────────────────────────────
function renderReading() {
  const total = books.length;
  const done  = books.filter(b => checked[b.id]).length;
  const pct   = total ? Math.round(done/total*100) : 0;

  let html = `
    <div class="reading-list-view">
    <div class="reading-progress-summary">
      <div class="rps-stat"><div class="rps-num">${done}</div><div class="rps-label">Finished</div></div>
      <div class="rps-stat"><div class="rps-num">${total-done}</div><div class="rps-label">Remaining</div></div>
      <div class="rps-bar-wrap">
        <div class="rps-bar-label">Summer reading · ${pct}%</div>
        <div class="rps-bar"><div class="rps-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  ['In Progress','Up Next','Later Summer'].forEach(section => {
    const list = books.filter(b => b.section === section);
    if (!list.length) return;
    html += `<div class="reading-section-title">${section}</div>`;
    list.forEach(b => {
      const isDone = !!checked[b.id];
      const tagClass = isDone ? 'done' : b.tag;
      const tagText  = isDone ? 'Finished ✓' : (b.tag==='reading'?'Reading now':b.tag==='trip'?'Bring on trip':'Queued');
      html += `
        <div class="book-card${isDone?' done':''}" onclick="toggleTask('${b.id}')">
          <div class="book-emoji">${b.emoji}</div>
          <div class="book-info">
            <div class="book-title">${b.title}</div>
            <div class="book-author">${b.author}</div>
            <div class="book-note">${b.note}</div>
          </div>
          <div class="book-status">
            <div class="book-checkbox">${isDone?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
            <span class="book-tag tag-${tagClass}">${tagText}</span>
          </div>
        </div>`;
    });
  });
  html += `</div>`;
  return html;
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  let content = '';
  if      (viewMode === 'tasks')    content = renderTasks();
  else if (viewMode === 'schedule') content = renderSchedule();
  else                              content = renderReading();
  document.getElementById('app').innerHTML = renderNav() + content;
}

loadState();
</script>
</body>
</html>
